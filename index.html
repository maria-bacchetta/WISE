<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>WISE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- INTRO VIDEO -->

    <div id="intro">

        <video autoplay muted id="introVideo">
            <source src="wise.mp4" type="video/mp4">
        </video>

    </div>


    <!-- WEBSITE -->

    <div id="homepage">

        <header>

            <div class="nav-left">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Events</a>
            </div>

            <div class="logo">
                <img src="logo.png">
            </div>

            <div class="nav-right">
                <a href="YOUR_GOOGLE_FORM_LINK" class="join-btn">Join WISE</a>
            </div>

        </header>



        <!-- HERO SECTION -->

        <section class="hero">

            <div class="hero-img">

                <img src="logo.png">

            </div>

            <div class="hero-text">

                <h1>WOMEN IN</h1>
                <h1>SCIENCE AND TECHNOLOGY</h1>

                <p>
                    WISE builds a community where women grow,
                    innovate and lead in science and engineering.
                </p>

            </div>

        </section>

    </div>



        <script>

                setTimeout(function(){

                    document.getElementById("intro").style.display = "none";
                document.getElementById("homepage").style.display="block";

},2000);

        </script>



</body>

</html>
